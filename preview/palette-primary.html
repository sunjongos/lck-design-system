<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_frame.css"></head>
<body><div class="card">
  <div class="t-overline">Brand Colors / Primary</div>
  <div class="grid" style="grid-template-columns: repeat(4, 1fr); gap: 14px;">
    <div class="col">
      <div class="swatch" style="background: var(--lab-navy); height: 80px;"></div>
      <div class="swatch-label"><span>Deep Navy</span><span class="hex">#0A192F</span></div>
    </div>
    <div class="col">
      <div class="swatch" style="background: var(--lab-dark); height: 80px;"></div>
      <div class="swatch-label"><span>Dark</span><span class="hex">#020C1B</span></div>
    </div>
    <div class="col">
      <div class="swatch" style="background: var(--lab-cyan); height: 80px; box-shadow: var(--glow-cyan);"></div>
      <div class="swatch-label"><span style="color: var(--lab-cyan)">Electric Cyan</span><span class="hex">#00E5FF</span></div>
    </div>
    <div class="col">
      <div class="swatch" style="background: var(--lab-gold); height: 80px; box-shadow: var(--glow-gold);"></div>
      <div class="swatch-label"><span style="color: var(--lab-gold)">Premium Gold</span><span class="hex">#D4AF37</span></div>
    </div>
  </div>
</div></body></html>
