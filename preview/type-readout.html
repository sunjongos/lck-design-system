<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_frame.css"></head>
<body><div class="card">
  <div class="t-overline">Type / Overlines & Readouts</div>
  <div class="row" style="gap: 24px;">
    <div class="col"><div class="t-caption">OVERLINE</div><div class="t-overline">SYSTEM / LIVE</div></div>
    <div class="col"><div class="t-caption">EYEBROW</div><div class="t-eyebrow">AI.READY</div></div>
    <div class="col"><div class="t-caption">STATUS TOKEN</div><div style="font-family: var(--font-mono); font-size: 12px; letter-spacing: .22em; color: var(--lab-gold); text-transform: uppercase;">PREMIUM.TIER</div></div>
  </div>
  <div class="hairline"></div>
  <div class="row" style="gap: 28px; align-items: flex-end;">
    <div class="col" style="gap: 4px;">
      <div class="t-caption">QPS</div>
      <div class="t-readout-xl">1,402</div>
    </div>
    <div class="col" style="gap: 4px;">
      <div class="t-caption">LATENCY</div>
      <div class="t-readout-xl" style="color: var(--fg-0);">12<span style="font-size: 20px; color: var(--fg-2); margin-left: 4px;">ms</span></div>
    </div>
    <div class="col" style="gap: 4px;">
      <div class="t-caption">ACCURACY</div>
      <div class="t-readout-xl" style="color: var(--lab-gold); text-shadow: 0 0 10px rgba(212,175,55,0.6);">99.8<span style="font-size: 20px; color: var(--fg-2); margin-left: 4px;">%</span></div>
    </div>
  </div>
</div></body></html>
