<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_frame.css"></head>
<body><div class="card">
  <div class="t-overline">Semantic / Status</div>
  <div class="grid" style="grid-template-columns: repeat(5, 1fr); gap: 12px;">
    <div class="col"><div class="swatch" style="background: var(--lab-green); height: 64px;"></div>
      <div class="swatch-label"><span style="color: var(--lab-green)">Success</span><span class="hex">#92C118</span></div></div>
    <div class="col"><div class="swatch" style="background: var(--lab-cyan); height: 64px;"></div>
      <div class="swatch-label"><span style="color: var(--lab-cyan)">Info</span><span class="hex">#00E5FF</span></div></div>
    <div class="col"><div class="swatch" style="background: var(--lab-orange); height: 64px;"></div>
      <div class="swatch-label"><span style="color: var(--lab-orange)">Warning</span><span class="hex">#F29D00</span></div></div>
    <div class="col"><div class="swatch" style="background: var(--lab-red); height: 64px;"></div>
      <div class="swatch-label"><span style="color: var(--lab-red)">Danger</span><span class="hex">#FF3B6B</span></div></div>
    <div class="col"><div class="swatch" style="background: var(--lab-purple); height: 64px;"></div>
      <div class="swatch-label"><span style="color: var(--lab-purple)">Experimental</span><span class="hex">#7B61FF</span></div></div>
  </div>
  <div class="row" style="margin-top: 6px; gap: 10px;">
    <span style="display:inline-flex; align-items:center; gap:6px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--lab-green);"><span style="width:8px;height:8px;border-radius:50%;background:var(--lab-green);box-shadow:0 0 8px var(--lab-green);"></span>ONLINE</span>
    <span style="display:inline-flex; align-items:center; gap:6px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--lab-cyan);"><span style="width:8px;height:8px;border-radius:50%;background:var(--lab-cyan);box-shadow:0 0 8px var(--lab-cyan);"></span>AI.READY</span>
    <span style="display:inline-flex; align-items:center; gap:6px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--lab-orange);"><span style="width:8px;height:8px;border-radius:50%;background:var(--lab-orange);"></span>DEGRADED</span>
    <span style="display:inline-flex; align-items:center; gap:6px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--lab-red);"><span style="width:8px;height:8px;border-radius:50%;background:var(--lab-red);box-shadow:0 0 8px var(--lab-red);"></span>CRITICAL</span>
  </div>
</div></body></html>
