<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_frame.css"></head>
<body><div class="card">
  <div class="t-overline">Cards / Surfaces</div>
  <div class="row" style="gap: 14px; align-items: stretch;">
    <!-- flat card -->
    <div style="flex: 1; background: var(--bg-2); border: 1px solid var(--border-default); border-radius: 10px; padding: 14px;">
      <div class="t-caption" style="margin-bottom: 6px;">FLAT · bg-2</div>
      <div class="t-readout" style="font-size: 20px; color: var(--fg-0);">AGENT.NODE.01</div>
      <div class="t-body-sm" style="color: var(--fg-2); margin-top: 4px;">Standard content surface.</div>
    </div>
    <!-- glass -->
    <div style="flex: 1; background: var(--glass-panel); backdrop-filter: blur(16px); border: 1px solid var(--border-cyan); border-radius: 10px; padding: 14px; position: relative;">
      <div style="position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--lab-cyan), transparent); opacity: 0.5;"></div>
      <div class="t-caption" style="margin-bottom: 6px; color: var(--lab-cyan);">GLASS · cyan glow-border</div>
      <div class="t-readout" style="font-size: 20px; color: var(--fg-0);">ANALYSIS.LIVE</div>
      <div class="t-body-sm" style="color: var(--fg-2); margin-top: 4px;">Primary panel with top glow line.</div>
    </div>
    <!-- premium -->
    <div style="flex: 1; background: var(--glass-panel); backdrop-filter: blur(16px); border: 1px solid var(--border-gold); border-radius: 10px; padding: 14px; position: relative;">
      <div style="position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--lab-gold), transparent); opacity: 0.5;"></div>
      <div class="t-caption" style="margin-bottom: 6px; color: var(--lab-gold);">PREMIUM · gold</div>
      <div class="t-readout" style="font-size: 20px; color: var(--fg-0);">MASTER.DEPLOY</div>
      <div class="t-body-sm" style="color: var(--fg-2); margin-top: 4px;">Reserved for high-tier actions.</div>
    </div>
  </div>
</div></body></html>
