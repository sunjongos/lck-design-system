<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_frame.css"></head>
<body><div class="card">
  <div class="t-overline">Inputs / Fields</div>
  <div class="col" style="gap: 14px; max-width: 560px;">
    <div class="col" style="gap: 4px;">
      <div class="t-caption">QUERY</div>
      <div style="display: flex; align-items: center; gap: 8px; background: var(--bg-3); border: 1px solid var(--border-default); border-radius: 6px; padding: 0 12px; height: 40px;">
        <span style="font-family: var(--font-mono); color: var(--lab-cyan); font-size: 12px;">▶</span>
        <input style="flex: 1; background: transparent; border: none; outline: none; color: var(--fg-0); font-family: var(--font-mono); font-size: 13px;" value="SELECT * FROM runs WHERE status='live'"/>
      </div>
    </div>
    <div class="col" style="gap: 4px;">
      <div class="t-caption">NODE ID</div>
      <div style="display: flex; align-items: center; gap: 8px; background: var(--bg-3); border: 1px solid var(--border-cyan); border-radius: 6px; padding: 0 12px; height: 40px; box-shadow: 0 0 0 2px rgba(0,229,255,0.12);">
        <input style="flex: 1; background: transparent; border: none; outline: none; color: var(--fg-0); font-family: var(--font-mono); font-size: 13px;" value="0x8AF1-0042"/>
        <span class="t-caption" style="color: var(--lab-cyan);">FOCUSED</span>
      </div>
    </div>
    <div class="col" style="gap: 4px;">
      <div class="t-caption">DISABLED</div>
      <div style="display: flex; align-items: center; background: var(--bg-3); border: 1px solid var(--border-default); border-radius: 6px; padding: 0 12px; height: 40px; opacity: 0.5;">
        <span style="color: var(--fg-3); font-family: var(--font-mono); font-size: 13px;">—</span>
      </div>
    </div>
  </div>
</div></body></html>
