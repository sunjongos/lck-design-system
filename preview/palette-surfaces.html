<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_frame.css"></head>
<body><div class="card">
  <div class="t-overline">Surface / Neutral Scale</div>
  <div class="grid" style="grid-template-columns: repeat(5, 1fr); gap: 10px;">
    <div class="col"><div class="swatch" style="background: var(--bg-0); height: 70px;"></div><div class="swatch-label"><span>bg-0 page</span><span class="hex">#020C1B</span></div></div>
    <div class="col"><div class="swatch" style="background: var(--bg-1); height: 70px;"></div><div class="swatch-label"><span>bg-1</span><span class="hex">#061428</span></div></div>
    <div class="col"><div class="swatch" style="background: var(--bg-2); height: 70px;"></div><div class="swatch-label"><span>bg-2 card</span><span class="hex">#0A192F</span></div></div>
    <div class="col"><div class="swatch" style="background: var(--bg-3); height: 70px;"></div><div class="swatch-label"><span>bg-3 input</span><span class="hex">#112240</span></div></div>
    <div class="col"><div class="swatch" style="background: var(--bg-4); height: 70px;"></div><div class="swatch-label"><span>bg-4</span><span class="hex">#1A2F55</span></div></div>
  </div>
  <div class="hairline" style="margin-top: 4px;"></div>
  <div class="row" style="gap: 18px;">
    <span style="color: var(--fg-0); font-family: var(--font-mono); font-size: 12px;">fg-0 ████ primary</span>
    <span style="color: var(--fg-1); font-family: var(--font-mono); font-size: 12px;">fg-1 ████ 88%</span>
    <span style="color: var(--fg-2); font-family: var(--font-mono); font-size: 12px;">fg-2 ████ gray</span>
    <span style="color: var(--fg-3); font-family: var(--font-mono); font-size: 12px;">fg-3 ████ hint</span>
    <span style="color: var(--fg-4); font-family: var(--font-mono); font-size: 12px;">fg-4 ████ disabled</span>
  </div>
</div></body></html>
