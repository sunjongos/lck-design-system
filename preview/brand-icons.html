<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_frame.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body><div class="card">
  <div class="t-overline">Iconography — Lucide</div>
  <div class="row" style="gap: 22px; color: var(--fg-0);">
    <div class="col" style="gap: 6px; align-items: center;"><i data-lucide="activity" style="width:24px;height:24px;color:var(--lab-cyan);"></i><div class="t-caption">activity</div></div>
    <div class="col" style="gap: 6px; align-items: center;"><i data-lucide="cpu" style="width:24px;height:24px;color:var(--lab-cyan);"></i><div class="t-caption">cpu</div></div>
    <div class="col" style="gap: 6px; align-items: center;"><i data-lucide="database" style="width:24px;height:24px;color:var(--lab-gold);"></i><div class="t-caption">database</div></div>
    <div class="col" style="gap: 6px; align-items: center;"><i data-lucide="fingerprint" style="width:24px;height:24px;color:var(--fg-0);"></i><div class="t-caption">fingerprint</div></div>
    <div class="col" style="gap: 6px; align-items: center;"><i data-lucide="sparkles" style="width:24px;height:24px;color:var(--lab-gold);"></i><div class="t-caption">sparkles</div></div>
    <div class="col" style="gap: 6px; align-items: center;"><i data-lucide="terminal" style="width:24px;height:24px;color:var(--fg-2);"></i><div class="t-caption">terminal</div></div>
    <div class="col" style="gap: 6px; align-items: center;"><i data-lucide="shield-check" style="width:24px;height:24px;color:var(--lab-green);"></i><div class="t-caption">shield</div></div>
    <div class="col" style="gap: 6px; align-items: center;"><i data-lucide="zap" style="width:24px;height:24px;color:var(--lab-cyan);"></i><div class="t-caption">zap</div></div>
  </div>
  <div class="t-caption">Stroke 1.5–2px · rounded joints · colored by role</div>
  <script>lucide.createIcons();</script>
</div></body></html>
